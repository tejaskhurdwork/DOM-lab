<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>custom-uploader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    
    html,
    body {
      height: 100%;
      width: 100%;
      background-color: #111;
      user-select: none;
    }
    
    div {
      width: 100%;
      height: 100vh;
      color: rgba(167, 165, 162, 0.679);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 8rem;
      font-weight: 100;
    }

    #inpfile {
      display: none;
    }

    .btn {
      height: 2rem;
      width: fit-content;
      padding: 0rem 1rem;
      border-radius: 5px;
      border: none;
      background-color: rgb(11, 75, 193);
      transition: all 0.3s ease-in-out 0s;
      color: white;
    }

    .btn:hover {
      background-color: rgb(4, 27, 112);
    }
  </style>

</head>
<body>
  <div>
    <input id="inpfile" type="file">
    <button class="btn">Upload File</button>
  </div>
  <script src="./custom-uploader.js"></script>
</body>
</html>
