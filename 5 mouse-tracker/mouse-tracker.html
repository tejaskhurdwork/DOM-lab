<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mouse-tracker</title>
  <style>
    body {
      overflow: hidden;
    }

    .tracker {
      position: absolute;
      background-color: yellow;
      width: 50px;
      height: 50px;
      transition: all cubic-bezier(0.19, 1, 0.22, 1) 0.1s;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="tracker"></div>

  <script src="./mouse-tracker.js"></script>
</body>
</html>
