<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>email-password-validator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .validator-container {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        input[type="email"],
        input[type="password"] {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            outline: none;
            transition: border 0.3s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #007BFF;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background: #007BFF;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease-in-out;
        }

        button:hover {
            background-color: #0056b3;
        }

        .error {
            color: red;
            display: none;
            margin-bottom: 20px;
        }

        .valid{
            color: rgb(18, 62, 255);
            display: none;
            margin: 15px auto 5px;
        }

    </style>
</head>
<body>

    <div class="validator-container">
        <h2>Login</h2>
        <form autocomplete="on" id="form">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="example@gmail.com" required>
            <small class="error" id="emailError"></small>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Min 6 characters" required>
            <small class="error" id="passwordError"></small>

            <button type="submit">Login</button>
            <small class="valid"></small>
        </form>
    </div>

    <script src="./email-password-validator.js"></script>
</body>
</html>
