<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>download-progress-bar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f6f8;
    }

    .download-container {
      background: white;
      padding: 30px;
      width: 400px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }

    .download-container h2 {
      margin-bottom: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background: #e5e7eb;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .progress {
      width: 0%;
      height: 100%;
      background: #4f46e5;
      border-radius: 20px;
      transition: width 0.3s ease;
    }

    .percentage {
      margin-bottom: 20px;
      font-weight: bold;
    }

    .download-btn {
      padding: 10px 20px;
      border: none;
      background: #4f46e5;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .download-btn:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>

  <div class="download-container">
    <h2>Click button to Start download</h2>

    <div class="progress-bar">
      <div class="progress"></div>
    </div>

    <p class="percentage">0%</p>

    <button class="download-btn">Start Download</button>
  </div>

  <script src="./download-progress-bar.js"></script>
</body>
</html>
